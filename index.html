<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="imagens/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="estilos/mobile_first.css" media="screen">
    <link rel="stylesheet" href="estilos/telas_maiores.css" media="screen and (min-width: 768px)">
    <title>Card de Resultados</title>
</head>
<body>
    <main>
        <section id="result">
            <p id="pdestaque">Your Result</p>
            <div>76 of 100</div>
            <h1>Great</h1>
            <p>You scored higher than 65% of the people who have taken these tests.</p>
        </section>
        <section>
            <h2>Summary</h2>
            <div>
                <div><img src="imagens/icon-reaction.svg" alt="Ícone da Reação">80/100</div>
                <div><img src="imagens/icon-memory.svg" alt="Ícone da Memória">92/100</div>
                <div><img src="imagens/icon-verbal.svg" alt="Ícone do Verbal">61/100</div>
                <div><img src="imagens/icon-visual.svg" alt="Ícone do Visual">73/100</div>
            </div>
        </section>
        <a href="#"><button>Continue</button></a>
    </main>
</body>
</html>
