<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="imagens/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="estilos/mobile_first.css" media="screen">
    <link rel="stylesheet" href="estilos/telas_maiores.css" media="screen and (min-width: 768px)">
    <title>Card de Resultados</title>
</head>
<body>
    <main>
        <section id="result">
            <p id="pdestaque">Your Result</p>
            <div><span id="nota">76</span> <span id="cem">of 100</span></div>
            <h1>Great</h1>
            <p id="pfinal">You scored higher than 65% of the people who have taken these tests.</p>
        </section>
        <section id="sumarry">
            <h2>Summary</h2>
            <div id="container">
                <div id="reaction" class="aptidoes"><img src="imagens/icon-reaction.svg" alt="Ícone da Reação"><span>Reaction</span> 80/100</div>
                <div id="memory" class="aptidoes"><img src="imagens/icon-memory.svg" alt="Ícone da Memória"><span>Memory</span> 92/100</div>
                <div id="verbal" class="aptidoes"><img src="imagens/icon-verbal.svg" alt="Ícone do Verbal"><span>Verbal</span> 61/100</div>
                <div id="visual" class="aptidoes"><img src="imagens/icon-visual.svg" alt="Ícone do Visual"><span>Visual</span> 73/100</div>
            </div>
            <a href="#"><button>Continue</button></a>
        </section>
    </main>
</body>
</html>
